name: Get VLESS Link

on:
  workflow_dispatch:

jobs:
  get-link:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract UUID
        run: |
          UUID=$(grep -o '"id":"[^"]*"' .devcontainer/config.json | head -1 | cut -d'"' -f4)
          echo "UUID=$UUID" >> $GITHUB_ENV
          
      - name: Show Link
        run: |
          echo "========================================="
          echo "vless://${{ env.UUID }}@94.130.50.12:443?encryption=none&security=tls&sni=YOUR-CODESPACE-443.app.github.dev&host=YOUR-CODESPACE-443.app.github.dev&fp=chrome&allowInsecure=1&type=xhttp&mode=packet-up&path=%2F#my-proxy"
          echo "========================================="
